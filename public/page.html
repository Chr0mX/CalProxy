<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CalProxy</title>
<style>
/* ── Base variables (blue theme — default) ── */
:root{
  --bg:#0b1020;--card:#131a2b;--txt:#e6edf7;--muted:#9aa8c1;--border:#263149;
  --accent:#6aa8ff;--accent2:#6aa8ff;
}
@media (prefers-color-scheme:light){
  :root{--bg:#f4f7fb;--card:#fff;--txt:#0f172a;--muted:#52607a;--border:#d8e0ef;
    --accent:#2563eb;--accent2:#2563eb;}
}

/* ── Orange theme ── */
[data-theme=orange]{--accent:#ff8c42;--accent2:#ff8c42;}
@media (prefers-color-scheme:light){
  [data-theme=orange]{--accent:#d95f00;--accent2:#d95f00;}
}

/* ── Gold theme ── */
[data-theme=gold]{--accent:#f5c842;--accent2:#f5c842;}
@media (prefers-color-scheme:light){
  [data-theme=gold]{--accent:#b58900;--accent2:#b58900;}
}

/* ── Mixed theme (orange primary accent, blue secondary) ── */
[data-theme=mixed]{--accent:#ff8c42;--accent2:#6aa8ff;}
@media (prefers-color-scheme:light){
  [data-theme=mixed]{--accent:#d95f00;--accent2:#2563eb;}
}

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.45 system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* ── Header ── */
header{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid var(--border);gap:10px;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-right{display:flex;align-items:center;gap:8px;}
#page-title{font-weight:700;font-size:15px;}
.login-link{border:1px solid var(--border);padding:6px 12px;border-radius:8px;color:var(--txt);text-decoration:none;font-size:13px;}
.login-link:hover{border-color:var(--accent);color:var(--accent);}

/* ── Webcal header button ── */
.webcal-header-btn{position:relative;display:inline-block;}
.webcal-header-btn > button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.webcal-header-btn > button:hover{opacity:0.85;}
.webcal-drop{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;min-width:220px;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.25);}
.webcal-drop.open{display:block;}
.webcal-drop-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 8px;border-radius:6px;}
.webcal-drop-item:hover{background:var(--bg);}
.webcal-drop-item-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.webcal-drop-item-desc{font-size:11px;color:var(--muted);}
.webcal-drop-link{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:11px;cursor:pointer;text-decoration:none;white-space:nowrap;}
.webcal-drop-link:hover{opacity:0.85;}

/* ── Main container ── */
.container{max-width:980px;width:100%;margin:auto;padding:20px;flex:1;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}

/* ── Card header with toggle ── */
.card-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.card-header-row h2{margin:0;font-size:16px;}
.desc-toggle{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:3px 9px;cursor:pointer;line-height:1.4;}
.desc-toggle:hover{border-color:var(--accent);color:var(--accent);}

/* ── Calendar events ── */
.group{margin-top:18px;}
.date{font-weight:700;margin:12px 0 8px;color:var(--accent);}

/* ── Event item with thumbnail ── */
.item{
  display:flex;align-items:flex-start;padding:8px 10px;
  border:1px solid var(--border);border-radius:10px;margin-bottom:8px;gap:10px;
  position:relative;cursor:default;
}
.item:hover{border-color:var(--accent);background:rgba(106,168,255,.04);}

/* Poster thumbnail — LEFT aligned, fixed size */
.event-thumb{
  width:40px;height:58px;object-fit:cover;border-radius:5px;
  flex-shrink:0;background:var(--border);
}
.event-thumb-placeholder{
  width:40px;height:58px;border-radius:5px;flex-shrink:0;
  background:var(--border);opacity:0.4;
}

/* Event body */
.event-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:2px;}
.event-title{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.event-desc{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none;}
.event-desc.visible{display:block;}
.event-time{font-size:11px;color:var(--muted);}
.source-tag{color:var(--muted);white-space:nowrap;font-size:12px;align-self:center;flex-shrink:0;}

/* ARR (Sonarr/Radarr) specific layout */
.event-episode{font-size:12px;color:var(--txt);opacity:0.75;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.event-se-time{font-size:11px;color:var(--muted);}
.item.arr .event-desc{white-space:normal;word-wrap:break-word;overflow:visible;text-overflow:unset;}

/* ── Hover tooltip ── */
.item-tooltip{
  display:none;position:absolute;z-index:200;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;max-width:320px;min-width:180px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  left:0;top:calc(100% + 6px);font-size:12px;line-height:1.5;
  pointer-events:none;
}
.item:hover .item-tooltip{display:block;}
.tooltip-title{font-weight:600;margin-bottom:4px;color:var(--txt);}
.tooltip-desc{color:var(--muted);font-size:11px;margin-top:4px;white-space:pre-wrap;word-break:break-word;}
.tooltip-meta{color:var(--accent2);font-size:11px;margin-top:4px;}

.empty{color:var(--muted);}

/* ── Footer ── */
footer{border-top:1px solid var(--border);padding:12px 22px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);flex-shrink:0;}
footer a{color:var(--muted);text-decoration:none;}
footer a:hover{color:var(--accent);}

/* ── Theme switcher (bottom-left fixed) ── */
.theme-switcher{position:fixed;bottom:16px;left:16px;z-index:200;}
.theme-switcher-toggle{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;}
.theme-switcher-toggle:hover{border-color:var(--accent);color:var(--txt);}
.theme-switcher-panel{display:none;position:absolute;bottom:calc(100% + 6px);left:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;box-shadow:0 6px 20px rgba(0,0,0,.25);}
.theme-switcher-panel.open{display:block;}
.theme-opt{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:12px;white-space:nowrap;}
.theme-opt:hover{background:var(--bg);}
.theme-opt.active{color:var(--accent);font-weight:600;}
.theme-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <strong id="page-title">CalProxy</strong>
  </div>
  <div class="header-right">
    <div class="webcal-header-btn" id="webcalHeaderBtn" style="display:none">
      <button onclick="toggleWebcalDrop(event)" title="Subscribe in calendar app">&#128197; Subscribe</button>
      <div class="webcal-drop" id="webcalDrop"></div>
    </div>
    <a class="login-link" href="/login">Login</a>
  </div>
</header>
<div class="container">
  <div class="card">
    <div class="card-header-row">
      <h2>Upcoming Events</h2>
      <button class="desc-toggle" id="descToggleBtn" onclick="toggleDescriptions()" title="Show/hide event descriptions">Desc: OFF</button>
    </div>
    <div id="calendar" class="empty">Loading events…</div>
  </div>
</div>
<footer>
  <a href="https://github.com/Chr0mX/CalProxy" target="_blank" rel="noopener noreferrer">CalProxy on GitHub</a>
  <span id="version-info"></span>
</footer>

<!-- Theme switcher — bottom-left -->
<div class="theme-switcher" id="themeSwitcher" style="display:none">
  <button class="theme-switcher-toggle" onclick="toggleThemePanel(event)">&#9680; Theme</button>
  <div class="theme-switcher-panel" id="themePanel">
    <div class="theme-opt" data-theme="blue"   onclick="setTheme('blue')">  <span class="theme-swatch" style="background:#6aa8ff"></span>Blue</div>
    <div class="theme-opt" data-theme="orange" onclick="setTheme('orange')"><span class="theme-swatch" style="background:#ff8c42"></span>Orange</div>
    <div class="theme-opt" data-theme="gold"   onclick="setTheme('gold')">  <span class="theme-swatch" style="background:#f5c842"></span>Gold</div>
    <div class="theme-opt" data-theme="mixed"  onclick="setTheme('mixed')"> <span class="theme-swatch" style="background:linear-gradient(135deg,#ff8c42 50%,#6aa8ff 50%)"></span>Mixed</div>
  </div>
</div>

<script>
(async function () {
  const slug = window.location.pathname.replace(/^\/+/, '') || '';
  const calRoot = document.getElementById('calendar');

  // Description toggle state — persisted in localStorage
  let showDescriptions = localStorage.getItem('calproxy-show-desc') === 'true';
  updateDescToggleBtn();

  let data;
  try {
    const res = await fetch('/api/public/page/' + encodeURIComponent(slug));
    if (!res.ok) { calRoot.textContent = res.status === 404 ? 'Page not found.' : 'Failed to load page.'; return; }
    data = await res.json();
  } catch { calRoot.textContent = 'Unable to load page data.'; return; }

  // Title
  if (data.title) {
    document.title = data.title + ' — CalProxy';
    document.getElementById('page-title').textContent = data.title;
  }

  // Version footer
  if (data.version) {
    document.getElementById('version-info').textContent = data.version;
  }

  // Theme: localStorage wins; fall back to server-configured theme, then default (blue)
  const storedTheme = localStorage.getItem('calproxy-theme');
  const serverTheme = data.theme || '';
  applyTheme(storedTheme || serverTheme || 'blue');
  document.getElementById('themeSwitcher').style.display = '';

  // Webcal button in top bar
  if (data.show_webcal && Array.isArray(data.sources) && data.sources.length) {
    const btn = document.getElementById('webcalHeaderBtn');
    const drop = document.getElementById('webcalDrop');
    btn.style.display = '';

    if (data.sources.length === 1) {
      const src = data.sources[0];
      const url = 'webcal://' + window.location.host + '/cal/' + src.token;
      const b = btn.querySelector('button');
      b.onclick = null;
      b.addEventListener('click', function () { window.location.href = url; });
      drop.parentElement.querySelector('.webcal-drop').remove();
    } else {
      drop.innerHTML = data.sources.map(function (src) {
        const url = 'webcal://' + window.location.host + '/cal/' + src.token;
        return '<div class="webcal-drop-item">' +
          '<div><div class="webcal-drop-item-name">' + esc(src.name) + '</div>' +
          (src.description ? '<div class="webcal-drop-item-desc">' + esc(src.description) + '</div>' : '') +
          '</div>' +
          '<a class="webcal-drop-link" href="' + url + '">Subscribe</a>' +
          '</div>';
      }).join('');
    }
  }

  // Events
  const events = data.events || [];
  if (!events.length) { calRoot.textContent = 'No upcoming events.'; return; }

  const groups = {};
  events.forEach(function (e) {
    const label = new Date(e.date).toLocaleDateString(undefined, {weekday: 'short', month: 'short', day: 'numeric'});
    (groups[label] = groups[label] || []).push(e);
  });

  calRoot.innerHTML = '';
  Object.entries(groups).forEach(function ([dateLabel, list]) {
    const g = document.createElement('div');
    g.className = 'group';
    g.innerHTML = '<div class="date">' + esc(dateLabel) + '</div>';
    list.forEach(function (ev) {
      const t = new Date(ev.date).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
      const item = document.createElement('div');
      item.className = 'item';

      // Thumbnail — left aligned
      const thumbHTML = ev.imageUrl
        ? '<img class="event-thumb" src="' + esc(ev.imageUrl) + '" alt="" loading="lazy" />'
        : '<div class="event-thumb-placeholder"></div>';

      // Description — shown/hidden via toggle
      const descHTML = ev.description
        ? '<div class="event-desc' + (showDescriptions ? ' visible' : '') + '">' + esc(truncate(ev.description, 120)) + '</div>'
        : '';

      // Tooltip content
      const tooltipLines = [
        '<div class="tooltip-title">' + esc(ev.title) + '</div>',
      ];
      if (ev.isArr && ev.episode) {
        tooltipLines.push('<div class="tooltip-meta">' + esc(ev.se || '') + (ev.se ? ' &nbsp;·&nbsp; ' : '') + esc(t) + ' &nbsp;·&nbsp; ' + esc(ev.source) + '</div>');
        tooltipLines.push('<div class="tooltip-desc" style="color:var(--txt);opacity:0.8;font-size:11px;margin-top:2px;">' + esc(ev.episode) + '</div>');
      } else {
        tooltipLines.push('<div class="tooltip-meta">' + esc(t) + ' &nbsp;·&nbsp; ' + esc(ev.source) + '</div>');
      }
      if (ev.description) {
        tooltipLines.push('<div class="tooltip-desc">' + esc(truncate(ev.description, 300)) + '</div>');
      }

      // Body layout differs for ARR sources
      let bodyHTML;
      if (ev.isArr) {
        item.classList.add('arr');
        const episodeHTML = ev.episode
          ? '<div class="event-episode">' + esc(ev.episode) + '</div>'
          : '';
        const seTimeHTML = '<div class="event-se-time">' +
          (ev.se ? esc(ev.se) + ' &nbsp;·&nbsp; ' : '') + esc(t) +
          '</div>';
        bodyHTML =
          '<div class="event-title">' + esc(ev.title) + '</div>' +
          episodeHTML +
          descHTML +
          seTimeHTML;
      } else {
        bodyHTML =
          '<div class="event-title">' + esc(ev.title) + '</div>' +
          descHTML +
          '<div class="event-time">' + esc(t) + '</div>';
      }

      item.innerHTML =
        thumbHTML +
        '<div class="event-body">' +
          bodyHTML +
        '</div>' +
        '<div class="source-tag">' + esc(ev.source) + '</div>' +
        '<div class="item-tooltip">' + tooltipLines.join('') + '</div>';

      g.appendChild(item);
    });
    calRoot.appendChild(g);
  });

  // ── Helpers ────────────────────────────────────────────────────────────────

  function applyTheme(t) {
    const valid = ['blue', 'orange', 'gold', 'mixed'];
    t = valid.includes(t) ? t : 'blue';
    document.documentElement.dataset.theme = t === 'blue' ? '' : t;
    document.querySelectorAll('.theme-opt').forEach(function (el) {
      el.classList.toggle('active', el.dataset.theme === t);
    });
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // expose to onclick handlers in the static HTML
  window._applyTheme = applyTheme;
  window._escFn = esc;
})();

function truncate(s, n) {
  if (!s) return '';
  // Replace actual newlines with space for inline display
  s = s.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function setTheme(t) {
  localStorage.setItem('calproxy-theme', t);
  if (window._applyTheme) window._applyTheme(t);
  document.getElementById('themePanel').classList.remove('open');
}

function toggleThemePanel(e) {
  e.stopPropagation();
  document.getElementById('themePanel').classList.toggle('open');
  document.getElementById('webcalDrop') && document.getElementById('webcalDrop').classList.remove('open');
}

function toggleWebcalDrop(e) {
  e.stopPropagation();
  document.getElementById('webcalDrop').classList.toggle('open');
  document.getElementById('themePanel').classList.remove('open');
}

function toggleDescriptions() {
  const show = localStorage.getItem('calproxy-show-desc') !== 'true';
  localStorage.setItem('calproxy-show-desc', show ? 'true' : 'false');
  document.querySelectorAll('.event-desc').forEach(function (el) {
    el.classList.toggle('visible', show);
  });
  updateDescToggleBtn();
}

function updateDescToggleBtn() {
  const show = localStorage.getItem('calproxy-show-desc') === 'true';
  const btn = document.getElementById('descToggleBtn');
  if (btn) btn.textContent = 'Desc: ' + (show ? 'ON' : 'OFF');
}

// Close dropdowns on outside click
document.addEventListener('click', function () {
  var d = document.getElementById('webcalDrop');
  var p = document.getElementById('themePanel');
  if (d) d.classList.remove('open');
  if (p) p.classList.remove('open');
});
</script>
</body>
</html>
