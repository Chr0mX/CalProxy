<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalProxy Homepage</title>
<style>
:root{color-scheme:dark light;--bg:#0f1115;--panel:#171a21;--border:#2b313d;--text:#e6e9ef;--muted:#9aa4b2;--accent:#7aa2ff}
@media (prefers-color-scheme: light){:root{--bg:#f6f8fb;--panel:#fff;--border:#dde3ef;--text:#1f2430;--muted:#5d6778;--accent:#335dff}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
a.btn{color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:.45rem .8rem;border-radius:8px;font-weight:600}
main{max-width:1000px;margin:0 auto;padding:1rem;display:grid;gap:1rem}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem}
#calendar{display:grid;gap:.8rem}.day h3{margin:0 0 .4rem;font-size:.95rem;color:var(--muted)}
.item{display:flex;justify-content:space-between;gap:.8rem;padding:.45rem .6rem;border:1px solid var(--border);border-radius:8px}
.item .name{font-weight:600}.item .src{font-size:.8rem;color:var(--muted)}
.empty{color:var(--muted)}
</style>
</head>
<body>
<header>
  <div>
    <h1 id="title" style="margin:0;font-size:1.2rem;">Homepage</h1>
    <small id="subtitle" style="color:var(--muted)">Upcoming media calendar</small>
  </div>
  <a class="btn" href="/admin">Login</a>
</header>
<main>
  <section class="card">
    <h2 style="margin:.2rem 0 1rem">Upcoming</h2>
    <div id="calendar"><div class="empty">Loading…</div></div>
  </section>
</main>
<script>
async function loadHomepage(){
  const res=await fetch('/api/public/homepage');
  if(!res.ok){document.getElementById('calendar').innerHTML='<div class="empty">Homepage unavailable</div>';return}
  const data=await res.json();
  document.getElementById('title').textContent=data.title||'Homepage';
  const cal=document.getElementById('calendar');
  if(!data.days||!data.days.length){cal.innerHTML='<div class="empty">No upcoming events</div>';return}
  cal.innerHTML=data.days.map(day=>`<div class="day"><h3>${day.date}</h3>${day.items.map(i=>`<div class="item"><span><span class="name">${i.title}</span><br><span class="src">${i.source}</span></span><span>${i.time||''}</span></div>`).join('')}</div>`).join('');
}
loadHomepage();
</script>
</body>
</html>
