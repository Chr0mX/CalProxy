<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalProxy Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --accent:  #58a6ff;
    --danger:  #f85149;
    --warn:    #d29922;
    --ok:      #3fb950;
    --text:    #c9d1d9;
    --muted:   #8b949e;
    --radius:  6px;
    --mono:    'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 16px; color: var(--accent); letter-spacing: 0.5px; }
  header .version { color: var(--muted); font-size: 11px; }
  header .spacer { flex: 1; }
  header .stats { color: var(--muted); font-size: 11px; }

  main { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .section { margin-bottom: 40px; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .toolbar h2 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* Buttons */
  button {
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 12px;
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.15s, color 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #79c0ff; border-color: #79c0ff; color: #0d1117; }
  button.danger { border-color: var(--danger); color: var(--danger); }
  button.danger:hover { background: var(--danger); color: #0d1117; }
  button.small { padding: 3px 8px; font-size: 11px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  a.btn {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3px 8px;
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }
  a.btn:hover { border-color: var(--ok); color: var(--ok); }

  a.btn-logout {
    font-family: var(--mono);
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 12px;
    background: var(--surface);
    color: var(--muted);
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }
  a.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
  }
  .card.disabled { opacity: 0.55; }
  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .card-desc { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .card-meta { color: var(--muted); font-size: 11px; margin-top: 8px; }
  .card-meta span { margin-right: 16px; }
  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid;
  }
  .badge.enabled  { color: var(--ok);   border-color: var(--ok);   }
  .badge.disabled { color: var(--muted); border-color: var(--muted); }
  .badge.merge    { color: var(--warn);  border-color: var(--warn);  }

  .card-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

  .token-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .token-label { color: var(--muted); font-size: 10px; flex-shrink: 0; }
  .token-value { color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
  .copy-group { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }

  /* Merge source tags */
  .source-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .source-tag {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 10px;
    color: var(--muted);
  }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty .icon { font-size: 32px; margin-bottom: 8px; }

  /* Modal */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 540px;
    margin: 16px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { font-size: 14px; margin-bottom: 16px; color: var(--accent); }

  label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 4px; margin-top: 12px; }
  input[type=text], input[type=url], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }

  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .checkbox-row input { width: auto; }

  /* Merge source checkboxes */
  .source-checklist {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    max-height: 180px;
    overflow-y: auto;
  }
  .source-check-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    border-radius: 4px;
    cursor: pointer;
  }
  .source-check-item:hover { background: var(--surface); }
  .source-check-item input { width: auto; cursor: pointer; }
  .source-check-item label { margin: 0; cursor: pointer; color: var(--text); font-size: 12px; }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 12px;
    z-index: 200;
    transition: opacity 0.3s;
    opacity: 0;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  .error-banner {
    background: rgba(248,81,73,0.1);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--danger);
    margin-bottom: 16px;
    font-size: 12px;
    display: none;
  }
  .error-banner.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>&#x1F4C5; CalProxy</h1>
  <span class="version">webcal reverse proxy</span>
  <span class="spacer"></span>
  <span class="stats" id="statsLine">loading…</span>
  <a class="btn-logout" href="/logout">Logout</a>
</header>

<main>
  <!-- ── Sources ──────────────────────────────────────────────────────────── -->
  <div class="section">
    <div class="toolbar">
      <h2>Sources</h2>
      <button class="primary" onclick="openAdd()">+ Add Source</button>
    </div>
    <div class="error-banner" id="errBanner"></div>
    <div id="sourceList"></div>
  </div>

  <!-- ── Merge Groups ─────────────────────────────────────────────────────── -->
  <div class="section">
    <div class="toolbar">
      <h2>Merge Groups</h2>
      <button class="primary" onclick="openAddMerge()">+ Create Merge</button>
    </div>
    <div id="mergeList"></div>
  </div>

  <!-- ── Public Pages ───────────────────────────────────────────────────── -->
  <div class="section">
    <div class="toolbar">
      <h2>Public Pages</h2>
      <button class="primary" onclick="openAddPage()">+ Create Page</button>
    </div>
    <div id="pageList"></div>
  </div>
</main>

<!-- ── Add / Edit Source modal ──────────────────────────────────────────────── -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">Add Source</h3>
    <div class="error-banner" id="modalErr"></div>

    <label for="fName">Name *</label>
    <input type="text" id="fName" placeholder="Sonarr TV">

    <label for="fUrl">Upstream URL *</label>
    <input type="url" id="fUrl" placeholder="http://sonarr:8989/feed/v3/calendar/Sonarr.ics?apikey=…">

    <label for="fDesc">Description</label>
    <textarea id="fDesc" rows="2" placeholder="TV show air dates"></textarea>

    <div class="checkbox-row">
      <input type="checkbox" id="fEnabled" checked>
      <label for="fEnabled" style="margin:0">Enabled</label>
    </div>

    <div class="modal-footer">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="saveBtn" onclick="saveSource()">Save</button>
    </div>
  </div>
</div>

<!-- ── Add / Edit Merge Group modal ─────────────────────────────────────────── -->
<div class="overlay" id="mergeModal">
  <div class="modal">
    <h3 id="mergeModalTitle">Create Merge Group</h3>
    <div class="error-banner" id="mergeModalErr"></div>

    <label for="mName">Name *</label>
    <input type="text" id="mName" placeholder="All Calendars">

    <label>Sources to include</label>
    <div class="source-checklist" id="mergeSourceList">
      <span style="color:var(--muted);font-size:11px">No sources available</span>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="mEnabled" checked>
      <label for="mEnabled" style="margin:0">Enabled</label>
    </div>

    <div class="modal-footer">
      <button onclick="closeMergeModal()">Cancel</button>
      <button class="primary" id="mergeSaveBtn" onclick="saveMerge()">Save</button>
    </div>
  </div>
</div>

<!-- ── Add / Edit Public Page modal ──────────────────────────────────────────── -->
<div class="overlay" id="pageModal">
  <div class="modal">
    <h3 id="pageModalTitle">Create Public Page</h3>
    <div class="error-banner" id="pageModalErr"></div>

    <label for="pTitle">Title *</label>
    <input type="text" id="pTitle" placeholder="Anime Calendar">

    <label for="pSlug">Slug (auto-generated if blank)</label>
    <input type="text" id="pSlug" placeholder="anime">

    <label>Sources to expose</label>
    <div class="source-checklist" id="pageSourceList">
      <span style="color:var(--muted);font-size:11px">No sources available</span>
    </div>

    <label for="pTheme">Theme</label>
    <select id="pTheme">
      <option value="">Default (blue)</option>
      <option value="blue">Blue</option>
      <option value="orange">Orange</option>
      <option value="gold">Gold</option>
      <option value="mixed">Mixed (Orange + Blue)</option>
    </select>

    <div class="checkbox-row">
      <input type="checkbox" id="pIsDefault">
      <label for="pIsDefault" style="margin:0">Default page (redirected to from /)</label>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="pShowWebcal">
      <label for="pShowWebcal" style="margin:0">Show webcal subscribe button</label>
    </div>

    <div class="modal-footer">
      <button onclick="closePageModal()">Cancel</button>
      <button class="primary" id="pageSaveBtn" onclick="savePage()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

let editToken = null;
let editMergeToken = null;
let editPageSlug = null;
let sources = [];
let merges = [];
let pages = [];

// ── API helper ────────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 401) {
    window.location.href = '/login';
    throw new Error('session expired');
  }
  if (!r.ok) {
    const text = await r.text().catch(() => r.statusText);
    throw new Error(`${r.status}: ${text.trim()}`);
  }
  const ct = r.headers.get('content-type') || '';
  if (ct.includes('application/json')) return r.json();
  return null;
}

// ── Load & render ─────────────────────────────────────────────────────────────

async function load() {
  try {
    [sources, merges, pages] = await Promise.all([
      api('GET', '/api/sources'),
      api('GET', '/api/merges'),
      api('GET', '/api/pages'),
    ]);
    render();
    renderMerges();
    renderPages();
    loadStats();
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

async function loadStats() {
  try {
    const s = await api('GET', '/api/stats');
    document.getElementById('statsLine').textContent =
      `sources: ${s.sources}  merges: ${s.mergeGroups}  pages: ${s.publicPages}  cached: ${s.cached}  ttl: ${s.cacheTtl}s`;
  } catch (_) {}
}

function render() {
  const el = document.getElementById('sourceList');
  if (!sources.length) {
    el.innerHTML = `<div class="empty"><div class="icon">📭</div>No sources yet — add one to get started.</div>`;
    return;
  }
  const sorted = [...sources].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  el.innerHTML = sorted.map(s => sourceCardHTML(s)).join('');
}

function renderMerges() {
  const el = document.getElementById('mergeList');
  if (!merges.length) {
    el.innerHTML = `<div class="empty"><div class="icon">🔀</div>No merge groups yet — combine sources into one feed.</div>`;
    return;
  }
  const sorted = [...merges].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  el.innerHTML = sorted.map(m => mergeCardHTML(m)).join('');
}

// ── Card HTML ─────────────────────────────────────────────────────────────────

function sourceCardHTML(s) {
  const origin = window.location.origin;
  const calUrl    = `${origin}/cal/${s.token}`;
  const webcalUrl = calUrl.replace(/^https?/, 'webcal');
  const tokenShort = s.token.slice(0, 8) + '…';
  const date = new Date(s.createdAt).toLocaleDateString();
  const badge = s.enabled
    ? `<span class="badge enabled">enabled</span>`
    : `<span class="badge disabled">disabled</span>`;

  return `
  <div class="card${s.enabled ? '' : ' disabled'}" data-token="${s.token}">
    <div class="card-header">
      <div style="flex:1">
        <div class="card-title">${esc(s.name)} ${badge}</div>
        ${s.description ? `<div class="card-desc">${esc(s.description)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="small" onclick="toggleEnabled('${s.token}', ${!s.enabled})">${s.enabled ? 'Disable' : 'Enable'}</button>
        <button class="small" onclick="refreshCache('${s.token}')">Purge Cache</button>
        <button class="small" onclick="openEdit('${s.token}')">Edit</button>
        <button class="small danger" onclick="deleteSource('${s.token}')">Delete</button>
      </div>
    </div>
    <div class="card-meta">
      <span>token: <code>${tokenShort}</code></span>
      <span>created: ${date}</span>
    </div>
    <div class="token-row">
      <span class="token-label">URL</span>
      <span class="token-value">${esc(calUrl)}</span>
      <div class="copy-group">
        <button class="small" onclick="copy('${calUrl}', this)">Copy HTTPS</button>
        <button class="small" onclick="copy('${webcalUrl}', this)">Copy webcal://</button>
        <a class="btn" href="${webcalUrl}" title="Open in system calendar app">Open in Webcal</a>
      </div>
    </div>
  </div>`;
}

function mergeCardHTML(m) {
  const origin = window.location.origin;
  const calUrl    = `${origin}/cal/${m.token}`;
  const webcalUrl = calUrl.replace(/^https?/, 'webcal');
  const tokenShort = m.token.slice(0, 8) + '…';
  const date = new Date(m.createdAt).toLocaleDateString();
  const badge = m.enabled
    ? `<span class="badge enabled">enabled</span>`
    : `<span class="badge disabled">disabled</span>`;

  const memberNames = (m.sources || []).map(tok => {
    const src = sources.find(s => s.token === tok);
    return src ? esc(src.name) : `<span style="color:var(--danger)">${tok.slice(0,8)}…</span>`;
  });

  const tagsHTML = memberNames.length
    ? memberNames.map(n => `<span class="source-tag">${n}</span>`).join('')
    : `<span style="color:var(--muted);font-size:11px">no sources selected</span>`;

  return `
  <div class="card${m.enabled ? '' : ' disabled'}" data-token="${m.token}">
    <div class="card-header">
      <div style="flex:1">
        <div class="card-title">${esc(m.name)} <span class="badge merge">merge</span> ${badge}</div>
      </div>
      <div class="card-actions">
        <button class="small" onclick="toggleMergeEnabled('${m.token}', ${!m.enabled})">${m.enabled ? 'Disable' : 'Enable'}</button>
        <button class="small" onclick="openEditMerge('${m.token}')">Edit</button>
        <button class="small danger" onclick="deleteMerge('${m.token}')">Delete</button>
      </div>
    </div>
    <div class="card-meta">
      <span>token: <code>${tokenShort}</code></span>
      <span>created: ${date}</span>
      <span>${(m.sources || []).length} source(s)</span>
    </div>
    <div class="source-tags">${tagsHTML}</div>
    <div class="token-row">
      <span class="token-label">URL</span>
      <span class="token-value">${esc(calUrl)}</span>
      <div class="copy-group">
        <button class="small" onclick="copy('${calUrl}', this)">Copy HTTPS</button>
        <button class="small" onclick="copy('${webcalUrl}', this)">Copy webcal://</button>
        <a class="btn" href="${webcalUrl}" title="Open in system calendar app">Open in Webcal</a>
      </div>
    </div>
  </div>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Source actions ────────────────────────────────────────────────────────────

async function toggleEnabled(token, enabled) {
  try {
    await api('PUT', `/api/sources/${token}`, { enabled });
    await load();
    toast(`Source ${enabled ? 'enabled' : 'disabled'}`);
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

async function refreshCache(token) {
  try {
    await api('POST', `/api/sources/${token}/refresh`);
    toast('Cache purged');
    loadStats();
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

async function deleteSource(token) {
  if (!confirm('Delete this source? This cannot be undone.')) return;
  try {
    await api('DELETE', `/api/sources/${token}`);
    await load();
    toast('Source deleted');
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

// ── Merge actions ─────────────────────────────────────────────────────────────

async function toggleMergeEnabled(token, enabled) {
  try {
    await api('PUT', `/api/merges/${token}`, { enabled });
    await load();
    toast(`Merge group ${enabled ? 'enabled' : 'disabled'}`);
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

async function deleteMerge(token) {
  if (!confirm('Delete this merge group? This cannot be undone.')) return;
  try {
    await api('DELETE', `/api/merges/${token}`);
    await load();
    toast('Merge group deleted');
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

// ── Source Modal ──────────────────────────────────────────────────────────────

function openAdd() {
  editToken = null;
  document.getElementById('modalTitle').textContent = 'Add Source';
  document.getElementById('fName').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fEnabled').checked = true;
  clearModalErr();
  document.getElementById('modal').classList.add('open');
  document.getElementById('fName').focus();
}

async function openEdit(token) {
  try {
    const src = await api('GET', `/api/sources/${token}`);
    editToken = token;
    document.getElementById('modalTitle').textContent = 'Edit Source';
    document.getElementById('fName').value = src.name;
    document.getElementById('fUrl').value = src.upstreamUrl;
    document.getElementById('fDesc').value = src.description || '';
    document.getElementById('fEnabled').checked = src.enabled;
    clearModalErr();
    document.getElementById('modal').classList.add('open');
    document.getElementById('fName').focus();
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editToken = null;
}

async function saveSource() {
  const name = document.getElementById('fName').value.trim();
  const upstreamUrl = document.getElementById('fUrl').value.trim();
  const description = document.getElementById('fDesc').value.trim();
  const enabled = document.getElementById('fEnabled').checked;

  if (!name || !upstreamUrl) {
    showModalErr('Name and Upstream URL are required.');
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  try {
    if (editToken) {
      await api('PUT', `/api/sources/${editToken}`, { name, upstreamUrl, description, enabled });
      toast('Source updated');
    } else {
      await api('POST', '/api/sources', { name, upstreamUrl, description, enabled });
      toast('Source created');
    }
    closeModal();
    await load();
  } catch (e) {
    if (e.message !== 'session expired') showModalErr(e.message);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Merge Modal ───────────────────────────────────────────────────────────────

function buildMergeSourceList(selectedTokens) {
  const container = document.getElementById('mergeSourceList');
  if (!sources.length) {
    container.innerHTML = `<span style="color:var(--muted);font-size:11px">No sources available — add a source first.</span>`;
    return;
  }
  container.innerHTML = sources.map(s => `
    <label class="source-check-item">
      <input type="checkbox" value="${s.token}" ${selectedTokens.includes(s.token) ? 'checked' : ''}>
      <label style="margin:0;color:var(--text)">${esc(s.name)}</label>
    </label>
  `).join('');
}

function getSelectedMergeSources() {
  return [...document.querySelectorAll('#mergeSourceList input[type=checkbox]:checked')]
    .map(cb => cb.value);
}

function openAddMerge() {
  editMergeToken = null;
  document.getElementById('mergeModalTitle').textContent = 'Create Merge Group';
  document.getElementById('mName').value = '';
  document.getElementById('mEnabled').checked = true;
  buildMergeSourceList([]);
  clearMergeModalErr();
  document.getElementById('mergeModal').classList.add('open');
  document.getElementById('mName').focus();
}

async function openEditMerge(token) {
  try {
    const mg = await api('GET', `/api/merges/${token}`);
    editMergeToken = token;
    document.getElementById('mergeModalTitle').textContent = 'Edit Merge Group';
    document.getElementById('mName').value = mg.name;
    document.getElementById('mEnabled').checked = mg.enabled;
    buildMergeSourceList(mg.sources || []);
    clearMergeModalErr();
    document.getElementById('mergeModal').classList.add('open');
    document.getElementById('mName').focus();
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

function closeMergeModal() {
  document.getElementById('mergeModal').classList.remove('open');
  editMergeToken = null;
}

async function saveMerge() {
  const name    = document.getElementById('mName').value.trim();
  const enabled = document.getElementById('mEnabled').checked;
  const selectedSources = getSelectedMergeSources();

  if (!name) {
    showMergeModalErr('Name is required.');
    return;
  }

  const btn = document.getElementById('mergeSaveBtn');
  btn.disabled = true;
  try {
    if (editMergeToken) {
      await api('PUT', `/api/merges/${editMergeToken}`, { name, sources: selectedSources, enabled });
      toast('Merge group updated');
    } else {
      await api('POST', '/api/merges', { name, sources: selectedSources, enabled });
      toast('Merge group created');
    }
    closeMergeModal();
    await load();
  } catch (e) {
    if (e.message !== 'session expired') showMergeModalErr(e.message);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('mergeModal').addEventListener('click', function(e) {
  if (e.target === this) closeMergeModal();
});

// ── Clipboard ─────────────────────────────────────────────────────────────────

async function copy(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  } catch (_) {
    prompt('Copy this URL:', text);
  }
}

// ── Toasts & errors ───────────────────────────────────────────────────────────

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function showError(msg) {
  const el = document.getElementById('errBanner');
  el.textContent = `Error: ${msg}`;
  el.classList.add('show');
}

function showModalErr(msg) {
  const el = document.getElementById('modalErr');
  el.textContent = msg;
  el.classList.add('show');
}

function clearModalErr() {
  const el = document.getElementById('modalErr');
  el.textContent = '';
  el.classList.remove('show');
}

function showMergeModalErr(msg) {
  const el = document.getElementById('mergeModalErr');
  el.textContent = msg;
  el.classList.add('show');
}

function clearMergeModalErr() {
  const el = document.getElementById('mergeModalErr');
  el.textContent = '';
  el.classList.remove('show');
}

// ── Public Pages ──────────────────────────────────────────────────────────────

function renderPages() {
  const el = document.getElementById('pageList');
  if (!pages.length) {
    el.innerHTML = `<div class="empty"><div class="icon">🌐</div>No public pages yet — create one to share calendars publicly.</div>`;
    return;
  }
  el.innerHTML = pages.map(p => pageCardHTML(p)).join('');
}

function pageCardHTML(p) {
  const origin = window.location.origin;
  const pageUrl = `${origin}/${p.slug}`;
  const memberNames = (p.sources || []).map(tok => {
    if (tok.startsWith('merge:')) {
      const mgToken = tok.slice(6);
      const mg = merges.find(m => m.token === mgToken);
      return mg
        ? `<span title="merge group">${esc(mg.name)} <span style="color:var(--muted);font-size:10px">(merge)</span></span>`
        : `<span style="color:var(--danger)">${esc(tok.slice(0,14))}…</span>`;
    }
    const src = sources.find(s => s.token === tok);
    return src ? esc(src.name) : `<span style="color:var(--danger)">${tok.slice(0,8)}…</span>`;
  });
  const tagsHTML = memberNames.length
    ? memberNames.map(n => `<span class="source-tag">${n}</span>`).join('')
    : `<span style="color:var(--muted);font-size:11px">no sources selected</span>`;
  const defaultBadge = p.is_default ? `<span class="badge merge">default</span> ` : '';
  const webcalBadge  = p.show_webcal_button ? `<span class="badge enabled">webcal</span> ` : '';
  const themeBadge   = p.theme ? `<span class="badge" style="background:var(--muted);color:#fff">${esc(p.theme)}</span> ` : '';

  return `
  <div class="card" data-slug="${esc(p.slug)}">
    <div class="card-header">
      <div style="flex:1">
        <div class="card-title">${esc(p.title)} ${defaultBadge}${webcalBadge}${themeBadge}</div>
        <div class="card-desc">/${esc(p.slug)}</div>
      </div>
      <div class="card-actions">
        <button class="small" onclick="openEditPage('${esc(p.slug)}')">Edit</button>
        <button class="small danger" onclick="deletePage('${esc(p.slug)}')">Delete</button>
      </div>
    </div>
    <div class="card-meta">
      <span>${(p.sources || []).length} source(s)</span>
    </div>
    <div class="source-tags">${tagsHTML}</div>
    <div class="token-row">
      <span class="token-label">URL</span>
      <span class="token-value">${esc(pageUrl)}</span>
      <div class="copy-group">
        <button class="small" onclick="copy('${pageUrl}', this)">Copy URL</button>
        <a class="btn" href="${pageUrl}" target="_blank">Open</a>
      </div>
    </div>
  </div>`;
}

function buildPageSourceList(selectedTokens) {
  const container = document.getElementById('pageSourceList');
  if (!sources.length && !merges.length) {
    container.innerHTML = `<span style="color:var(--muted);font-size:11px">No sources available — add a source first.</span>`;
    return;
  }
  const srcHTML = sources.map(s => `
    <label class="source-check-item">
      <input type="checkbox" value="${s.token}" ${selectedTokens.includes(s.token) ? 'checked' : ''}>
      <span style="color:var(--text)">${esc(s.name)}</span>
    </label>
  `).join('');
  const mergeHTML = merges.map(m => {
    const val = 'merge:' + m.token;
    return `
    <label class="source-check-item">
      <input type="checkbox" value="${val}" ${selectedTokens.includes(val) ? 'checked' : ''}>
      <span style="color:var(--text)">${esc(m.name)} <span style="color:var(--muted);font-size:11px">(merge group)</span></span>
    </label>`;
  }).join('');
  const sep = merges.length && sources.length
    ? `<div style="color:var(--muted);font-size:11px;padding:4px 0 2px">Merge Groups</div>`
    : '';
  container.innerHTML = srcHTML + sep + mergeHTML;
}

function getSelectedPageSources() {
  return [...document.querySelectorAll('#pageSourceList input[type=checkbox]:checked')]
    .map(cb => cb.value);
}

function openAddPage() {
  editPageSlug = null;
  document.getElementById('pageModalTitle').textContent = 'Create Public Page';
  document.getElementById('pTitle').value = '';
  document.getElementById('pSlug').value = '';
  document.getElementById('pIsDefault').checked = false;
  document.getElementById('pShowWebcal').checked = false;
  document.getElementById('pTheme').value = '';
  buildPageSourceList([]);
  clearPageModalErr();
  document.getElementById('pageModal').classList.add('open');
  document.getElementById('pTitle').focus();
}

async function openEditPage(slug) {
  try {
    const pg = await api('GET', `/api/pages/${slug}`);
    editPageSlug = slug;
    document.getElementById('pageModalTitle').textContent = 'Edit Public Page';
    document.getElementById('pTitle').value = pg.title;
    document.getElementById('pSlug').value = pg.slug;
    document.getElementById('pIsDefault').checked = pg.is_default;
    document.getElementById('pShowWebcal').checked = pg.show_webcal_button;
    document.getElementById('pTheme').value = pg.theme || '';
    buildPageSourceList(pg.sources || []);
    clearPageModalErr();
    document.getElementById('pageModal').classList.add('open');
    document.getElementById('pTitle').focus();
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

function closePageModal() {
  document.getElementById('pageModal').classList.remove('open');
  editPageSlug = null;
}

async function savePage() {
  const title      = document.getElementById('pTitle').value.trim();
  const slug       = document.getElementById('pSlug').value.trim();
  const is_default = document.getElementById('pIsDefault').checked;
  const show_webcal_button = document.getElementById('pShowWebcal').checked;
  const theme      = document.getElementById('pTheme').value || undefined;
  const selectedSources = getSelectedPageSources();

  if (!title) {
    showPageModalErr('Title is required.');
    return;
  }

  const btn = document.getElementById('pageSaveBtn');
  btn.disabled = true;
  try {
    if (editPageSlug) {
      await api('PUT', `/api/pages/${editPageSlug}`, { title, sources: selectedSources, is_default, show_webcal_button, theme });
      toast('Public page updated');
    } else {
      await api('POST', '/api/pages', { title, slug: slug || undefined, sources: selectedSources, is_default, show_webcal_button, theme });
      toast('Public page created');
    }
    closePageModal();
    await load();
  } catch (e) {
    if (e.message !== 'session expired') showPageModalErr(e.message);
  } finally {
    btn.disabled = false;
  }
}

async function deletePage(slug) {
  if (!confirm(`Delete public page "/${slug}"? This cannot be undone.`)) return;
  try {
    await api('DELETE', `/api/pages/${slug}`);
    await load();
    toast('Public page deleted');
  } catch (e) {
    if (e.message !== 'session expired') showError(e.message);
  }
}

document.getElementById('pageModal').addEventListener('click', function(e) {
  if (e.target === this) closePageModal();
});

function showPageModalErr(msg) {
  const el = document.getElementById('pageModalErr');
  el.textContent = msg;
  el.classList.add('show');
}

function clearPageModalErr() {
  const el = document.getElementById('pageModalErr');
  el.textContent = '';
  el.classList.remove('show');
}

// ── Init ──────────────────────────────────────────────────────────────────────

load();
</script>
</body>
</html>
