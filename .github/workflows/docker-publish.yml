name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .
          git checkout "${{ github.sha }}"

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use --name builder --driver docker-container
          docker buildx inspect --bootstrap

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Compute image tags and labels
        id: meta
        run: |
          IMAGE="ghcr.io/${IMAGE_NAME,,}"   # lowercase required by ghcr.io
          REF="${{ github.ref }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          TAGS="${IMAGE}:sha-${SHORT_SHA}"

          # :latest on default branch
          if [[ "$REF" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          # semver tags from git tag (v1.2.3 → 1, 1.2, 1.2.3)
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
            MAJOR="${VERSION%%.*}"
            MINOR="${VERSION%.*}"
            TAGS="${TAGS},${IMAGE}:${VERSION},${IMAGE}:${MINOR},${IMAGE}:${MAJOR}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          # OCI standard labels
          echo "labels<<EOF" >> "$GITHUB_OUTPUT"
          echo "org.opencontainers.image.source=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "org.opencontainers.image.revision=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Build and push
        run: |
          PUSH_FLAG="--load"
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            PUSH_FLAG="--push"
          fi

          # Convert comma-separated tags to repeated --tag flags
          TAG_FLAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"
          for t in "${TAG_ARRAY[@]}"; do
            TAG_FLAGS="${TAG_FLAGS} --tag ${t}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            ${PUSH_FLAG} \
            ${TAG_FLAGS} \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --cache-from "type=registry,ref=${{ steps.meta.outputs.image }}:buildcache" \
            --cache-to   "type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max" \
            .
