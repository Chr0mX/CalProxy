services:
  calproxy:
    image: ghcr.io/chr0mx/calproxy:latest
    container_name: calproxy
    restart: unless-stopped

    # ── Ports ─────────────────────────────────────────────────────────────────
    # Format: "HOST_PORT:3000" — only change the left side.
    ports:
      - "3456:3000"

    # ── Environment variables ─────────────────────────────────────────────────
    environment:
      # Port the app listens on inside the container (matches the right side of ports above).
      PORT: 3000

      # Admin password for the web UI. The app hashes this with bcrypt at startup;
      # the plaintext value is never stored on disk.
      ADMIN_PASSWORD: changeme

      # Where sources are persisted inside the container.
      # The directory must be inside the volume mount below.
      DATA_FILE: /data/sources.json

      # How long upstream feeds are cached in seconds.
      # 300 = 5 minutes. Increase to reduce upstream load.
      CACHE_TTL: 300

      # ── Volume permission fix (bind mounts only) ───────────────────────────
      # If you use a host-path bind mount (e.g. ./data:/data) and the container
      # cannot write to it, set PUID/PGID to match the UID/GID that owns the
      # host directory:
      #   PUID: "1000"
      #   PGID: "1000"
      # Named volumes (default below) do not need this — the entrypoint handles
      # ownership automatically.

    # ── Volumes ───────────────────────────────────────────────────────────────
    # Named volume (recommended): Docker manages ownership automatically.
    volumes:
      - calproxy_data:/data

    # For a host-path bind mount instead, replace the line above with:
    #   - ./data:/data
    # and set PUID/PGID to your host user's UID/GID (run: id -u && id -g).

    # ── Networks ──────────────────────────────────────────────────────────────
    # Must match your reverse proxy network (Nginx Proxy Manager default: "proxy").
    networks:
      - proxy

    # ── Homepage dashboard labels (optional) ─────────────────────────────────
    labels:
      homepage.group: "Media"
      homepage.name: "CalProxy"
      homepage.icon: "calendar"
      homepage.href: "http://calproxy:3000"
      homepage.description: "Webcal proxy for Sonarr & Radarr"

      # ── Traefik labels (optional — remove if using Nginx Proxy Manager) ─────
      # traefik.enable: "true"
      # traefik.http.routers.calproxy.rule: "Host(`calproxy.example.com`)"
      # traefik.http.routers.calproxy.entrypoints: "websecure"
      # traefik.http.routers.calproxy.tls.certresolver: "letsencrypt"
      # traefik.http.services.calproxy.loadbalancer.server.port: "3000"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  calproxy_data:
    name: calproxy_data

networks:
  proxy:
    external: true
